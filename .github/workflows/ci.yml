name: CI

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "vaults/**"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "vaults/**"

permissions:
  contents: read

jobs:
  quality:
    name: Python quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --dev --locked

      - name: Run tests
        run: uv run pytest

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run Pyrefly
        run: uv run pyrefly check --min-severity warn

      - name: Import FastAPI app
        run: uv run python -c "from codex_sdk_cli.api.main import app; print(app.title)"

      - name: Verify OpenAPI export is up to date
        run: uv run python scripts/export_openapi.py --check

  frontend:
    name: Ops UI gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Install Python dependencies
        run: uv sync --dev --locked

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify generated API client
        run: pnpm --filter codex-sdk-ops-ui api:check

      - name: Lint ops UI
        run: pnpm --filter codex-sdk-ops-ui lint

      - name: Typecheck ops UI
        run: pnpm --filter codex-sdk-ops-ui typecheck

      - name: Test ops UI
        run: pnpm --filter codex-sdk-ops-ui test

      - name: Build ops UI
        run: pnpm --filter codex-sdk-ops-ui build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker version
        run: docker version

      - name: Build image
        run: docker build -t codex-sdk-cli:test .

      - name: Smoke test CLI entrypoint
        run: docker run --rm codex-sdk-cli:test --help

      - name: Smoke test API import
        run: docker run --rm --entrypoint python codex-sdk-cli:test -c "from codex_sdk_cli.api.main import app; print(app.title)"

  home_deploy_preflight:
    name: Home deploy readiness
    runs-on: ubuntu-latest
    needs:
      - quality
      - docker
      - frontend
    if: github.event_name != 'pull_request'
    outputs:
      deploy_ready: ${{ steps.readiness.outputs.deploy_ready }}
    steps:
      - name: Check home deployment prerequisites
        id: readiness
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HOME_BASIC_AUTH_USER: ${{ secrets.HOME_BASIC_AUTH_USER }}
          HOME_BASIC_AUTH_PASSWORD: ${{ secrets.HOME_BASIC_AUTH_PASSWORD }}
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
          NGROK_DOMAIN: ${{ vars.NGROK_DOMAIN }}
        run: |
          set -eu

          missing=()
          required=(HOME_BASIC_AUTH_USER HOME_BASIC_AUTH_PASSWORD NGROK_AUTHTOKEN NGROK_DOMAIN)
          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              missing+=("${name}")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Home deploy is not ready. Missing prerequisites:\n'
            printf ' - %s\n' "${missing[@]}"
            echo "deploy_ready=false" >> "$GITHUB_OUTPUT"
            if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
              exit 1
            fi
            exit 0
          fi

          echo "Home deploy secrets are ready."
          echo "deploy_ready=true" >> "$GITHUB_OUTPUT"

  home_deploy:
    name: Deploy API to home PC
    runs-on: [self-hosted, Windows, X64, codex-home]
    needs:
      - home_deploy_preflight
    if: needs.home_deploy_preflight.outputs.deploy_ready == 'true'
    timeout-minutes: 30
    outputs:
      public_tunnel_url: ${{ steps.public_tunnel.outputs.url }}
    env:
      HOME_BASIC_AUTH_USER: ${{ secrets.HOME_BASIC_AUTH_USER }}
      HOME_BASIC_AUTH_PASSWORD: ${{ secrets.HOME_BASIC_AUTH_PASSWORD }}
      HOME_NGINX_PORT: ${{ vars.HOME_NGINX_PORT || '18080' }}
      NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
      NGROK_DOMAIN: ${{ vars.NGROK_DOMAIN }}
      CODEX_CLI_MODEL: ${{ vars.CODEX_CLI_MODEL }}
      CODEX_CLI_SANDBOX: ${{ vars.CODEX_CLI_SANDBOX || 'workspace-write' }}
      CODEX_CLI_APPROVAL: ${{ vars.CODEX_CLI_APPROVAL || 'auto-review' }}
      CODEX_CLI_YOUTUBE_HTTP_PROXY: ${{ secrets.CODEX_CLI_YOUTUBE_HTTP_PROXY || vars.CODEX_CLI_YOUTUBE_HTTP_PROXY }}
      CODEX_CLI_YOUTUBE_HTTPS_PROXY: ${{ secrets.CODEX_CLI_YOUTUBE_HTTPS_PROXY || vars.CODEX_CLI_YOUTUBE_HTTPS_PROXY }}
      CODEX_CLI_YOUTUBE_DATA_API_KEY: ${{ secrets.CODEX_CLI_YOUTUBE_DATA_API_KEY || vars.CODEX_CLI_YOUTUBE_DATA_API_KEY }}
      CODEX_CLI_YOUTUBE_DATA_TIMEOUT_SECONDS: ${{ vars.CODEX_CLI_YOUTUBE_DATA_TIMEOUT_SECONDS }}
      CODEX_CLI_TRANSCRIPT_MINIO_ENDPOINT: ${{ vars.CODEX_CLI_TRANSCRIPT_MINIO_ENDPOINT }}
      CODEX_CLI_TRANSCRIPT_MINIO_ACCESS_KEY: ${{ secrets.CODEX_CLI_TRANSCRIPT_MINIO_ACCESS_KEY || vars.CODEX_CLI_TRANSCRIPT_MINIO_ACCESS_KEY }}
      CODEX_CLI_TRANSCRIPT_MINIO_SECRET_KEY: ${{ secrets.CODEX_CLI_TRANSCRIPT_MINIO_SECRET_KEY || vars.CODEX_CLI_TRANSCRIPT_MINIO_SECRET_KEY }}
      CODEX_CLI_TRANSCRIPT_MINIO_BUCKET: ${{ vars.CODEX_CLI_TRANSCRIPT_MINIO_BUCKET }}
      CODEX_CLI_TRANSCRIPT_MINIO_PREFIX: ${{ vars.CODEX_CLI_TRANSCRIPT_MINIO_PREFIX }}
      CODEX_CLI_TRANSCRIPT_MINIO_SECURE: ${{ vars.CODEX_CLI_TRANSCRIPT_MINIO_SECURE }}
      CODEX_CLI_EXTERNAL_API_CALL_MINIO_PREFIX: ${{ vars.CODEX_CLI_EXTERNAL_API_CALL_MINIO_PREFIX }}
      CODEX_CLI_DATABASE_URL: ${{ vars.CODEX_CLI_DATABASE_URL }}
      CODEX_CLI_DATABASE_ECHO: ${{ vars.CODEX_CLI_DATABASE_ECHO }}
    steps:
      - name: Preserve legacy checkout SQLite DB
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $backupDir = Join-Path $env:RUNNER_TEMP "codex-sdk-legacy-db"
          New-Item -ItemType Directory -Force $backupDir | Out-Null

          $legacyDb = Join-Path $env:GITHUB_WORKSPACE "data/app.db"
          $backupDb = Join-Path $backupDir "app.db"
          if (Test-Path -LiteralPath $legacyDb) {
            Copy-Item -LiteralPath $legacyDb -Destination $backupDb -Force
            "LEGACY_SQLITE_DB_BACKUP=$backupDb" >> $env:GITHUB_ENV
            Write-Host "Preserved legacy SQLite DB from $legacyDb"
          } else {
            "LEGACY_SQLITE_DB_BACKUP=" >> $env:GITHUB_ENV
            Write-Host "No legacy checkout SQLite DB found."
          }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker version
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          docker version
          docker compose version

      - name: Prepare home deployment files
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force ".docker-empty-s3" | Out-Null
          New-Item -ItemType Directory -Force ".home-deploy" | Out-Null

          $hash = $env:HOME_BASIC_AUTH_PASSWORD |
            docker run --rm -i httpd:2.4-alpine htpasswd -Bni $env:HOME_BASIC_AUTH_USER
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to generate Nginx Basic Auth file."
          }
          $hash | Set-Content -Encoding ascii ".home-deploy/nginx.htpasswd"

      - name: Validate home compose file
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          docker compose --project-name codex-sdk-home -f compose.home.yaml config

      - name: Migrate legacy SQLite DB to Docker volume
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $backupDb = $env:LEGACY_SQLITE_DB_BACKUP
          if ([string]::IsNullOrWhiteSpace($backupDb) -or -not (Test-Path -LiteralPath $backupDb)) {
            Write-Host "No legacy checkout SQLite DB backup found."
            exit 0
          }

          $volumeName = "codex-sdk-home_db-data"
          docker volume create $volumeName | Out-Null

          docker run --rm -v "${volumeName}:/data/db" alpine:3.22 sh -c "test -f /data/db/app.db"
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Docker volume $volumeName already has app.db; skipping legacy copy."
            exit 0
          }
          if ($LASTEXITCODE -ne 1) {
            throw "Failed to inspect SQLite DB in Docker volume $volumeName."
          }

          $backupDir = Split-Path -Parent $backupDb
          docker run --rm -v "${volumeName}:/data/db" -v "${backupDir}:/backup:ro" alpine:3.22 sh -c "mkdir -p /data/db && cp /backup/app.db /data/db/app.db && chown -R 1000:1000 /data/db"
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to copy legacy SQLite DB into Docker volume $volumeName."
          }
          Write-Host "Copied legacy SQLite DB into Docker volume $volumeName."

      - name: Deploy home stack
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          docker compose --project-name codex-sdk-home -f compose.home.yaml build api ops-ui
          docker compose --project-name codex-sdk-home -f compose.home.yaml run --rm --no-deps --entrypoint alembic api upgrade head
          docker compose --project-name codex-sdk-home -f compose.home.yaml up -d --build --force-recreate --remove-orphans api ops-ui nginx ngrok minio
          docker compose --project-name codex-sdk-home -f compose.home.yaml ps

      - name: Verify local Nginx health through Basic Auth
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $pair = "{0}:{1}" -f $env:HOME_BASIC_AUTH_USER, $env:HOME_BASIC_AUTH_PASSWORD
          $encoded = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($pair))
          $headers = @{ Authorization = "Basic $encoded" }
          $healthUri = "http://127.0.0.1:$env:HOME_NGINX_PORT/health"
          $opsUri = "http://127.0.0.1:$env:HOME_NGINX_PORT/ops"
          $opsSummaryUri = "http://127.0.0.1:$env:HOME_NGINX_PORT/ops/api/backend/ops/summary"
          $deadline = (Get-Date).AddSeconds(90)
          $lastError = $null

          while ((Get-Date) -lt $deadline) {
            try {
              $healthResponse = Invoke-WebRequest -Uri $healthUri -Headers $headers -TimeoutSec 15 -UseBasicParsing
              if ($healthResponse.StatusCode -ne 200 -or $healthResponse.Content -notmatch '"status"\s*:\s*"ok"') {
                throw "API health returned unexpected response."
              }

              $opsResponse = Invoke-WebRequest -Uri $opsUri -Headers $headers -TimeoutSec 15 -UseBasicParsing
              if ($opsResponse.StatusCode -ne 200) {
                throw "Ops UI returned HTTP $($opsResponse.StatusCode)."
              }

              $opsSummaryResponse = Invoke-WebRequest -Uri $opsSummaryUri -Headers $headers -TimeoutSec 15 -UseBasicParsing
              if ($opsSummaryResponse.StatusCode -ne 200 -or $opsSummaryResponse.Content -notmatch '"apiStatus"\s*:\s*"ok"') {
                throw "Ops UI BFF summary returned unexpected response."
              }

              exit 0
            } catch {
              $lastError = $_
              Write-Host "Local Nginx health attempt failed: $($_.Exception.Message)"
              Start-Sleep -Seconds 5
            }
          }

          if ($lastError) {
            throw $lastError
          }
          throw "Local Nginx health check timed out."

      - name: Capture ngrok public URL
        id: public_tunnel
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $urlPath = ".home-deploy/latest-tunnel-url.txt"
          if (Test-Path -LiteralPath $urlPath) {
            Remove-Item -LiteralPath $urlPath -Force
          }

          $domain = $env:NGROK_DOMAIN.Trim()
          if ([string]::IsNullOrWhiteSpace($domain)) {
            throw "NGROK_DOMAIN is required."
          }
          if ($domain -match "^https?://") {
            $url = $domain.TrimEnd("/")
          } else {
            $url = "https://$domain"
          }

          $url | Set-Content -Encoding ascii $urlPath
          "url=$url" >> $env:GITHUB_OUTPUT
          Write-Host "Public ngrok URL: $url"
          "### Home ngrok tunnel" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "Public URL: $url" >> $env:GITHUB_STEP_SUMMARY
          "Latest URL file on runner: $urlPath" >> $env:GITHUB_STEP_SUMMARY

      - name: Show home stack logs on failure
        if: failure()
        shell: powershell
        run: |
          docker compose --project-name codex-sdk-home -f compose.home.yaml ps
          docker compose --project-name codex-sdk-home -f compose.home.yaml logs --tail 200 api ops-ui nginx ngrok minio

  public_tunnel_health:
    name: Verify public ngrok health
    runs-on: ubuntu-latest
    needs:
      - home_deploy
    if: needs.home_deploy.outputs.public_tunnel_url != ''
    env:
      HOME_BASIC_AUTH_USER: ${{ secrets.HOME_BASIC_AUTH_USER }}
      HOME_BASIC_AUTH_PASSWORD: ${{ secrets.HOME_BASIC_AUTH_PASSWORD }}
      PUBLIC_TUNNEL_URL: ${{ needs.home_deploy.outputs.public_tunnel_url }}
    steps:
      - name: Verify public ngrok health through Basic Auth
        shell: bash
        run: |
          set -euo pipefail
          basic_auth="$(printf '%s:%s' "$HOME_BASIC_AUTH_USER" "$HOME_BASIC_AUTH_PASSWORD" | base64 -w 0)"
          echo "Public ngrok URL: ${PUBLIC_TUNNEL_URL}"
          curl \
            --fail \
            --silent \
            --show-error \
            --retry 60 \
            --retry-all-errors \
            --retry-delay 5 \
            --max-time 15 \
            --header "Authorization: Basic ${basic_auth}" \
            "${PUBLIC_TUNNEL_URL}/health"
          curl \
            --fail \
            --silent \
            --show-error \
            --retry 60 \
            --retry-all-errors \
            --retry-delay 5 \
            --max-time 15 \
            --output /dev/null \
            --header "Authorization: Basic ${basic_auth}" \
            "${PUBLIC_TUNNEL_URL}/ops"
          curl \
            --fail \
            --silent \
            --show-error \
            --retry 60 \
            --retry-all-errors \
            --retry-delay 5 \
            --max-time 15 \
            --header "Authorization: Basic ${basic_auth}" \
            "${PUBLIC_TUNNEL_URL}/ops/api/backend/ops/summary"
