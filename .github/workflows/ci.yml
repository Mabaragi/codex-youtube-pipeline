name: Manual Checks

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Python quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --dev --locked

      - name: Run tests
        run: uv run pytest

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run Pyrefly
        run: uv run pyrefly check --min-severity warn

      - name: Import FastAPI app
        run: uv run python -c "from codex_sdk_cli.api.main import app; print(app.title)"

      - name: Verify OpenAPI export is up to date
        run: uv run python scripts/export_openapi.py --check

  frontend:
    name: Ops UI gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install Python dependencies
        run: uv sync --dev --locked

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify generated API client
        run: pnpm --filter codex-sdk-ops-ui api:check

      - name: Lint ops UI
        run: pnpm --filter codex-sdk-ops-ui lint

      - name: Typecheck ops UI
        run: pnpm --filter codex-sdk-ops-ui typecheck

      - name: Test ops UI
        run: pnpm --filter codex-sdk-ops-ui test

      - name: Build ops UI
        run: pnpm --filter codex-sdk-ops-ui build
