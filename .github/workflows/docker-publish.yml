name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish image to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tags
        id: image
        shell: bash
        run: |
          set -eu
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          short_sha="${GITHUB_SHA::12}"
          {
            echo "name=${image_name}"
            echo "sha_tag=${image_name}:sha-${short_sha}"
            echo "latest_tag=${image_name}:latest"
          } >> "$GITHUB_OUTPUT"

          {
            echo "tags<<EOF"
            echo "${image_name}:sha-${short_sha}"
            echo "${image_name}:latest"
            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              echo "${image_name}:${GITHUB_REF_NAME}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version_tag=${image_name}:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Show Docker version
        run: docker version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image for smoke tests
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ steps.image.outputs.sha_tag }}
          provenance: false

      - name: Smoke test CLI entrypoint
        run: docker run --rm "${{ steps.image.outputs.sha_tag }}" --help

      - name: Smoke test API import
        run: docker run --rm --entrypoint python "${{ steps.image.outputs.sha_tag }}" -c "from codex_sdk_cli.api.main import app; print(app.title)"

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.tags }}
          provenance: false
