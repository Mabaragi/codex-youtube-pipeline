name: Legacy Docker Publish

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish legacy images to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tags
        id: image
        shell: bash
        run: |
          set -eu
          repo_lc="${GITHUB_REPOSITORY,,}"
          api_image="ghcr.io/${repo_lc}"
          ops_ui_image="ghcr.io/${repo_lc}-ops-ui"
          short_sha="${GITHUB_SHA::12}"
          {
            echo "api_sha_tag=${api_image}:sha-${short_sha}"
            echo "ops_ui_sha_tag=${ops_ui_image}:sha-${short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Show Docker version
        run: docker version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.image.outputs.api_sha_tag }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          provenance: false

      - name: Build and push ops UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ops-ui/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.ops_ui_sha_tag }}
          cache-from: type=gha,scope=ops-ui
          cache-to: type=gha,mode=max,scope=ops-ui
          provenance: false
