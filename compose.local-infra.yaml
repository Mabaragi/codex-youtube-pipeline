name: codex-sdk-home

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codex}
      POSTGRES_USER: ${POSTGRES_USER:-codex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${CODEX_CLI_TRANSCRIPT_MINIO_ACCESS_KEY:-CHANGE_ME_MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${CODEX_CLI_TRANSCRIPT_MINIO_SECRET_KEY:-CHANGE_ME_MINIO_SECRET}
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
