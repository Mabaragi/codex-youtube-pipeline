name: codex-sdk-home

services:
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${CODEX_CLI_TRANSCRIPT_MINIO_ACCESS_KEY:-codex}
      MINIO_ROOT_PASSWORD: ${CODEX_CLI_TRANSCRIPT_MINIO_SECRET_KEY:-codex-transcript-dev-password}
    volumes:
      - minio-data:/data

volumes:
  minio-data:
