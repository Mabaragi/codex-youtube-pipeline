services:
  api:
    build:
      context: .
    image: codex-sdk-cli:home
    restart: unless-stopped
    entrypoint: ["codex-api"]
    command: []
    expose:
      - "8000"
    environment:
      CODEX_CLI_MODEL: ${CODEX_CLI_MODEL:-}
      CODEX_CLI_SANDBOX: ${CODEX_CLI_SANDBOX:-workspace-write}
      CODEX_CLI_APPROVAL: ${CODEX_CLI_APPROVAL:-auto-review}
      CODEX_CLI_API_KEY: ${CODEX_CLI_API_KEY:-}
      CODEX_CLI_YOUTUBE_HTTP_PROXY: ${CODEX_CLI_YOUTUBE_HTTP_PROXY:-}
      CODEX_CLI_YOUTUBE_HTTPS_PROXY: ${CODEX_CLI_YOUTUBE_HTTPS_PROXY:-}
      CODEX_CLI_YOUTUBE_DATA_API_KEY: ${CODEX_CLI_YOUTUBE_DATA_API_KEY:-}
      CODEX_CLI_YOUTUBE_DATA_TIMEOUT_SECONDS: ${CODEX_CLI_YOUTUBE_DATA_TIMEOUT_SECONDS:-10}
      CODEX_CLI_TRANSCRIPT_MINIO_ENDPOINT: ${CODEX_CLI_TRANSCRIPT_MINIO_ENDPOINT:-minio:9000}
      CODEX_CLI_TRANSCRIPT_MINIO_ACCESS_KEY: ${CODEX_CLI_TRANSCRIPT_MINIO_ACCESS_KEY:-codex}
      CODEX_CLI_TRANSCRIPT_MINIO_SECRET_KEY: ${CODEX_CLI_TRANSCRIPT_MINIO_SECRET_KEY:-codex-transcript-dev-password}
      CODEX_CLI_TRANSCRIPT_MINIO_BUCKET: ${CODEX_CLI_TRANSCRIPT_MINIO_BUCKET:-raw}
      CODEX_CLI_TRANSCRIPT_MINIO_PREFIX: ${CODEX_CLI_TRANSCRIPT_MINIO_PREFIX:-youtube/transcripts}
      CODEX_CLI_TRANSCRIPT_MINIO_SECURE: ${CODEX_CLI_TRANSCRIPT_MINIO_SECURE:-false}
      CODEX_CLI_DATABASE_URL: ${CODEX_CLI_DATABASE_URL:-sqlite+aiosqlite:///./data/app.db}
      CODEX_CLI_DATABASE_ECHO: ${CODEX_CLI_DATABASE_ECHO:-false}
    depends_on:
      - minio
    volumes:
      - codex-home:/home/codex/.codex
      - type: bind
        source: ${CODEX_CLI_WORKDIR:-.}
        target: /work
      - type: bind
        source: ${CODEX_CLI_S3_DIR:-./.docker-empty-s3}
        target: /data/s3
        read_only: true

  codex:
    profiles: ["tools"]
    build:
      context: .
    image: codex-sdk-cli:home
    stdin_open: true
    tty: true
    working_dir: /work
    environment:
      CODEX_CLI_MODEL: ${CODEX_CLI_MODEL:-}
      CODEX_CLI_SANDBOX: ${CODEX_CLI_SANDBOX:-workspace-write}
      CODEX_CLI_APPROVAL: ${CODEX_CLI_APPROVAL:-auto-review}
      CODEX_CLI_API_KEY: ${CODEX_CLI_API_KEY:-}
      CODEX_CLI_YOUTUBE_HTTP_PROXY: ${CODEX_CLI_YOUTUBE_HTTP_PROXY:-}
      CODEX_CLI_YOUTUBE_HTTPS_PROXY: ${CODEX_CLI_YOUTUBE_HTTPS_PROXY:-}
      CODEX_CLI_YOUTUBE_DATA_API_KEY: ${CODEX_CLI_YOUTUBE_DATA_API_KEY:-}
      CODEX_CLI_YOUTUBE_DATA_TIMEOUT_SECONDS: ${CODEX_CLI_YOUTUBE_DATA_TIMEOUT_SECONDS:-10}
      CODEX_CLI_TRANSCRIPT_MINIO_ENDPOINT: ${CODEX_CLI_TRANSCRIPT_MINIO_ENDPOINT:-minio:9000}
      CODEX_CLI_TRANSCRIPT_MINIO_ACCESS_KEY: ${CODEX_CLI_TRANSCRIPT_MINIO_ACCESS_KEY:-codex}
      CODEX_CLI_TRANSCRIPT_MINIO_SECRET_KEY: ${CODEX_CLI_TRANSCRIPT_MINIO_SECRET_KEY:-codex-transcript-dev-password}
      CODEX_CLI_TRANSCRIPT_MINIO_BUCKET: ${CODEX_CLI_TRANSCRIPT_MINIO_BUCKET:-raw}
      CODEX_CLI_TRANSCRIPT_MINIO_PREFIX: ${CODEX_CLI_TRANSCRIPT_MINIO_PREFIX:-youtube/transcripts}
      CODEX_CLI_TRANSCRIPT_MINIO_SECURE: ${CODEX_CLI_TRANSCRIPT_MINIO_SECURE:-false}
      CODEX_CLI_DATABASE_URL: ${CODEX_CLI_DATABASE_URL:-sqlite+aiosqlite:///./data/app.db}
      CODEX_CLI_DATABASE_ECHO: ${CODEX_CLI_DATABASE_ECHO:-false}
    volumes:
      - codex-home:/home/codex/.codex
      - type: bind
        source: ${CODEX_CLI_WORKDIR:-.}
        target: /work
      - type: bind
        source: ${CODEX_CLI_S3_DIR:-./.docker-empty-s3}
        target: /data/s3
        read_only: true
    command: ["--help"]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:${HOME_NGINX_PORT:-18080}:80"
    volumes:
      - type: bind
        source: ./deploy/nginx/home.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
      - type: bind
        source: ./.home-deploy/nginx.htpasswd
        target: /etc/nginx/.htpasswd
        read_only: true

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - nginx
    command: tunnel --no-autoupdate --url http://nginx:80

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${CODEX_CLI_TRANSCRIPT_MINIO_ACCESS_KEY:-codex}
      MINIO_ROOT_PASSWORD: ${CODEX_CLI_TRANSCRIPT_MINIO_SECRET_KEY:-codex-transcript-dev-password}
    volumes:
      - minio-data:/data

volumes:
  codex-home:
  minio-data:
